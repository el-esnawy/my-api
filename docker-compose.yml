services:
  mongo:
    image: mongo:7
    container_name: my-api-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./docker-data/mongo:/data/db

  redis:
    image: redis:7-alpine
    container_name: my-api-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
